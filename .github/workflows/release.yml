name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Prepare release artifacts
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"

          # Generate merged firmware for single-command flashing (includes SPIFFS)
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode qio \
            --flash_size 16MB \
            --flash_freq 80m \
            -o "mimiclaw-full-${VERSION}.bin" \
            0x0      build/bootloader/bootloader.bin \
            0x8000   build/partition_table/partition-table.bin \
            0xf000   build/ota_data_initial.bin \
            0x20000  build/mimiclaw.bin \
            0x420000 build/spiffs.bin

          # Copy individual binaries with version suffix
          cp build/mimiclaw.bin              "mimiclaw-${VERSION}.bin"
          cp build/bootloader/bootloader.bin "bootloader-${VERSION}.bin"
          cp build/partition_table/partition-table.bin "partition-table-${VERSION}.bin"
          cp build/ota_data_initial.bin      "ota_data_initial-${VERSION}.bin"
          cp build/spiffs.bin                "spiffs-${VERSION}.bin"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Flashing Guide

            ### 1. Merged firmware (easiest)

            Download `mimiclaw-full-${{ github.ref_name }}.bin` and flash with a single command:

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash 0x0 mimiclaw-full-${{ github.ref_name }}.bin
            ```

            ### 2. Individual binaries (advanced)

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash \
              0x0      bootloader-${{ github.ref_name }}.bin \
              0x8000   partition-table-${{ github.ref_name }}.bin \
              0xf000   ota_data_initial-${{ github.ref_name }}.bin \
              0x20000  mimiclaw-${{ github.ref_name }}.bin \
              0x420000 spiffs-${{ github.ref_name }}.bin
            ```

            ### 3. OTA update (for devices already running MimiClaw)

            Upload `mimiclaw-${{ github.ref_name }}.bin` via the OTA endpoint.

            ### 4. First-time setup

            After flashing, connect via serial (115200 baud) and configure:

            ```
            wifi <ssid> <password>
            tg_token <your-telegram-bot-token>
            api_key <your-anthropic-api-key>
            reboot
            ```
          files: |
            mimiclaw-full-${{ github.ref_name }}.bin
            mimiclaw-${{ github.ref_name }}.bin
            bootloader-${{ github.ref_name }}.bin
            partition-table-${{ github.ref_name }}.bin
            ota_data_initial-${{ github.ref_name }}.bin
            spiffs-${{ github.ref_name }}.bin

      - name: Publish binaries to web flasher
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          BUILD_DIR="$(pwd)/build"
          # Checkout is at the release tag (detached); the flasher lives on
          # main, so switch there before committing to avoid pushing the
          # tag's history onto main.
          git fetch origin main
          git checkout -B main origin/main
          cp "$BUILD_DIR/bootloader/bootloader.bin"        docs/flash/firmware/bootloader.bin
          cp "$BUILD_DIR/partition_table/partition-table.bin" docs/flash/firmware/partition-table.bin
          cp "$BUILD_DIR/ota_data_initial.bin"             docs/flash/firmware/ota_data_initial.bin
          cp "$BUILD_DIR/mimiclaw.bin"                     docs/flash/firmware/mimiclaw.bin
          cp "$BUILD_DIR/spiffs.bin"                       docs/flash/firmware/spiffs.bin

          python3 - "$GITHUB_REF_NAME" <<'EOF'
          import json, sys
          path = "docs/flash/manifest.json"
          with open(path) as f:
              manifest = json.load(f)
          manifest["version"] = sys.argv[1]
          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/flash/firmware docs/flash/manifest.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish ${GITHUB_REF_NAME} firmware to web flasher"
            git push origin HEAD:main
            # Pushes made with the default GITHUB_TOKEN don't trigger other
            # workflows, so the Pages deploy needs an explicit kick here.
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
